# SIMULATION ONLY — does NOT publish to Maven Central.
#
# This file exists on the playground repo so the MDM Release Wizard
# can test the publish step end-to-end without touching the real
# Maven Central registry. It mirrors the shape of the real publish
# workflow (same name, same release-create trigger) so the wizard's
# polling code behaves identically against playground and prod —
# the only difference is that the body sleeps + exits success
# instead of running an actual `mvn deploy`.
#
# The `push: develop` trigger from the real workflow is intentionally
# dropped here: we don't want a sleep-2-min job firing on every commit
# during testing. Only release-create + manual dispatch.

name: Publish package to the Maven Central Repository

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Simulation notice
        run: |
          echo "================================================"
          echo " SIMULATION ONLY — playground repository."
          echo " This workflow does NOT publish anything to Maven"
          echo " Central. It exists so the MDM Release Wizard can"
          echo " test the publish step end-to-end without touching"
          echo " the real artifact registry."
          echo "================================================"
      - name: Simulate Maven build + GPG sign + OSSRH deploy
        run: |
          echo "Simulating Maven build + GPG sign + OSSRH deploy..."
          echo "Sleeping for 120 seconds to mimic real deploy time."
          sleep 120
          echo "Simulated deploy complete. (No JAR was uploaded anywhere.)"
      - name: Done
        run: |
          echo "On prod this workflow would have queued the JAR for"
          echo "Maven Central indexing (visible in 30 min - 24h)."
          echo "On playground the JAR will never appear on Maven Central."
